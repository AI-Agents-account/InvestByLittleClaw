spring:
  application:
    name: invest-backend

  datasource:
    url: jdbc:postgresql://db:5432/${POSTGRES_DB:invest}
    username: ${POSTGRES_USER:invest}
    password: ${POSTGRES_PASSWORD:invest_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
