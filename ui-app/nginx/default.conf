server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the backend service (docker-compose service name: app)
  # IMPORTANT: this location must appear BEFORE the SPA fallback location `/`
  location /api/ {
    # Preserve the original URI (/api/...) when proxying.
    # NOTE: no trailing slash here, otherwise nginx will strip the /api/ prefix.
    proxy_pass http://app:8080;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Serve static assets with caching
  location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
    try_files $uri =404;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
  }

  # SPA routing fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
